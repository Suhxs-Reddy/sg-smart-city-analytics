# Singapore Smart City - Phase 8: Enterprise Cloud Infrastructure
# ML Inference Engine Deployment + Autoscaling
#
# This handles the heavy GPU processing (YOLO Perception -> Florence VLM -> Neural ODEs).
# If the Redpanda stream starts lagging (e.g., during rush hour), KEDA/HPA will 
# dynamically spin up more GPU pods.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-engine
  namespace: sg-smart-city
  labels:
    app: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
      - name: inference-worker
        image: sgsmartcity/inference:latest # Pushed via CI/CD
        command: ["python", "src/inference/engine.py"]
        env:
          - name: KAFKA_BROKER
            value: "redpanda-headless.sg-smart-city.svc.cluster.local:9092"
          - name: MILVUS_HOST
            value: "milvus.sg-smart-city.svc.cluster.local"
          - name: MILVUS_PORT
            value: "19530"
          - name: CUDA_VISIBLE_DEVICES
            value: "0" # Bind to assigned GPU
        resources:
          limits:
            nvidia.com/gpu: 1 # Request 1 full GPU (e.g., T4/L4) per pod
            memory: "16Gi"
            cpu: "4"
          requests:
            memory: "8Gi"
            cpu: "2"
---
# Horizontal Pod Autoscaler (HPA)
# Automatically scales from 2 to 10 GPU instances during massive traffic spikes.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-inference-hpa
  namespace: sg-smart-city
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-inference-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80 # Spin up new GPU if CPU > 80%
