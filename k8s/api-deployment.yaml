# Singapore Smart City - Phase 8: Enterprise Cloud Infrastructure
# External Traffic API Deployment
#
# Exposes the Digital Twin state and analytics dashboard payload logic
# to the outside world via an ingress controller load balancer.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-api
  namespace: sg-smart-city
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-server
        image: sgsmartcity/api:latest
        command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
          - name: KAFKA_BROKER
            value: "redpanda-headless.sg-smart-city.svc.cluster.local:9092"
        ports:
        - containerPort: 8000
        readinessProbe: # Enterprise zero-downtime rolling update check
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-api-service
  namespace: sg-smart-city
spec:
  type: LoadBalancer # Provisions AWS/GCP Elastic Load Balancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: api
