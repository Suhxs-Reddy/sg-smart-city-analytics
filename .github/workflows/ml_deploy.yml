# Singapore Smart City - Phase 8: Enterprise CI/CD
# Automated Cloud Deployment Pipeline
#
# When new ML weights are pushed to the Model Registry or merging to main,
# this action automatically builds the Production Inference Container and 
# triggers a rolling update on the AWS EKS / GCP GKE cluster.

name: Enterprise ML Deployment Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/inference/**'
      - 'k8s/**'
      - 'models/level1/weights/*.onnx'
      - 'models/level3/*.ckpt'

env:
  PROJECT_ID: sg-smart-city-prod
  CLUSTER_NAME: sg-inference-cluster
  CLUSTER_ZONE: ap-southeast-1-a # Singapore Region

jobs:
  build-and-deploy:
    name: Build & Deploy Inference Engine
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud (or AWS)
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/123/locations/global/workloadIdentityPools/github/providers/my-repo'
        service_account: 'ml-deployer@sg-smart-city-prod.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker to use Registry
      run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

    - name: Build and Push Docker Image
      env:
        IMAGE_TAG: asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/ml-repo/inference:${{ github.sha }}
      run: |
        docker build -t $IMAGE_TAG -f Dockerfile .
        docker push $IMAGE_TAG

    - name: Get Kubernetes Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.CLUSTER_NAME }}
        location: ${{ env.CLUSTER_ZONE }}

    - name: Deploy Rolling Update to K8s Cluster
      env:
        IMAGE_TAG: asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/ml-repo/inference:${{ github.sha }}
      run: |
        # Update the deployment manifest with the newly built SHA-tagged image
        sed -i "s|image: sgsmartcity/inference:latest|image: $IMAGE_TAG|g" k8s/inference-deployment.yaml
        
        # Apply the StatefulSets (Kafka/Milvus)
        kubectl apply -f k8s/redpanda-statefulset.yaml
        kubectl apply -f k8s/milvus-statefulset.yaml
        
        # Trigger rolling update on inference workers and API
        kubectl apply -f k8s/inference-deployment.yaml
        kubectl apply -f k8s/api-deployment.yaml
        
        # Monitor the rollout status to ensure 0 seconds of downtime
        kubectl rollout status deployment/ml-inference-engine -n sg-smart-city --timeout=300s
