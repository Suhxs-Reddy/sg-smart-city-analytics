name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: Lint (ruff check + format enforcement)
  # ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint check
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format src/ tests/ --check

  # ─────────────────────────────────────────────────
  # Job 2: Core tests (no torch dependency)
  # Analytics, collector, detector, pipeline tests
  # ─────────────────────────────────────────────────
  test-core:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov responses
          pip install aiohttp pyyaml click numpy scipy pandas Pillow fastapi uvicorn
      - name: Run core tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_models.py \
            --ignore=tests/test_predictor.py \
            --ignore=tests/test_training.py \
            --cov=src --cov-report=term-missing --cov-fail-under=40

  # ─────────────────────────────────────────────────
  # Job 3: ML tests (with torch-cpu)
  # CATI architecture, training pipeline, predictor
  # ─────────────────────────────────────────────────
  test-ml:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov numpy scipy pandas pyyaml click
      - name: Run ML tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest \
            tests/test_models.py \
            tests/test_training.py \
            tests/test_predictor.py \
            -v --tb=short \
            --cov=src/models --cov=src/training \
            --cov-report=term-missing

  # ─────────────────────────────────────────────────
  # Job 4: Docker build (only on version tags)
  # ─────────────────────────────────────────────────
  docker:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test-core, test-ml]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
