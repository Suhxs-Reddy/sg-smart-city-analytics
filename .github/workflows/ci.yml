name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # Quality Checks (Linting, Formatting)
  # ============================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install ruff

    - name: Lint with Ruff
      run: |
        ruff check src/ tests/
        ruff format src/ tests/ --check

  # ============================================================================
  # Test Suite (Unit + Integration Tests)
  # ============================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Run tests
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Generate test report
      if: always()
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short --junitxml=test-results.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results.xml

  # ============================================================================
  # Docker Build (Verify Docker image builds successfully)
  # ============================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: sg-smart-city:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ============================================================================
  # Config Validation (Ensure YAML configs are valid)
  # ============================================================================
  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyYAML
      run: pip install pyyaml

    - name: Validate YAML configs
      run: |
        python -c "
        import yaml
        import sys
        from pathlib import Path

        configs = [
            'configs/collection_config.yaml',
            'configs/training_config.yaml',
            'configs/traffic_dataset.yaml',
        ]

        for config_path in configs:
            try:
                with open(config_path) as f:
                    yaml.safe_load(f)
                print(f'✅ {config_path} is valid')
            except Exception as e:
                print(f'❌ {config_path} is invalid: {e}')
                sys.exit(1)
        "

  # ============================================================================
  # Security Scan (Check for vulnerabilities)
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
