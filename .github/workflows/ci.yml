name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/ --output-format=github
          ruff format src/ tests/ --check

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -v --tb=short -x

      - name: Check imports
        run: |
          python -c "from src.ingestion.collector import DataCollector; print('✅ collector')"
          python -c "from src.detection.detector import TrafficDetector; print('✅ detector')"
          python -c "from src.analytics.predictor import TrafficLSTM; print('✅ predictor')"
          python -c "from src.analytics.drift_monitor import DriftMonitor; print('✅ drift_monitor')"

  docker-build-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only push to registry on main branch merges, not PRs
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sg-smart-city-inference:latest
          
      - name: Verify MLOps Zero-Cost Deployment
        run: echo "🚀 Docker Image successfully pushed to ghcr.io for $0 Serverless Cloud Deployment!"
