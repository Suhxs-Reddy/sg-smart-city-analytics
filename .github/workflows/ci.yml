name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/ --output-format=github
          ruff format src/ tests/ --check

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -v --tb=short -x

      - name: Check imports
        run: |
          python -c "from src.ingestion.collector import DataCollector; print('✅ collector')"
          python -c "from src.detection.detector import TrafficDetector; print('✅ detector')"
          python -c "from src.analytics.predictor import TrafficLSTM; print('✅ predictor')"
          python -c "from src.analytics.drift_monitor import DriftMonitor; print('✅ drift_monitor')"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sg-smart-city-analytics:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-api -p 8000:8000 sg-smart-city-analytics:test
          sleep 5
          curl -f http://localhost:8000/health || echo "Health check pending (expected without data)"
          docker stop test-api
