name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio responses
          pip install aiohttp pyyaml click numpy scipy pandas Pillow fastapi uvicorn
      - name: Lint
        run: ruff check src/ tests/
      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v --ignore=tests/test_predictor.py
